# -------------------------------------------------------------------------------
# SonarCloud Project Configuration
#
# Author: Alex Freidah
#
# Declares the SonarCloud project key and organisation, the coverage report
# path, and the directories the analyser must skip. Test files are analysed as
# tests (not main sources) so their inherently repetitive table-test and
# fake-client setup is not counted as source duplication or complexity.
# -------------------------------------------------------------------------------

sonar.projectKey=afreidah_oracle-watchdog
sonar.organization=afreidah

# Coverage reports: unit (`go test -coverprofile`) plus the integration suite
# (`go test -tags integration`). SonarCloud merges both, so code covered only by
# the real-Consul integration tests (the Run loops, the SDK adapters) counts.
sonar.go.coverage.reportPaths=coverage.out,integration-coverage.out

# Source directories. Test files, the Hugo site, docs, and packaging are not
# main sources and are excluded to avoid noisy duplication/complexity findings.
sonar.sources=.
sonar.exclusions=**/*_test.go,web/**,docs/**,packaging/**,grafana/**,**/*.md

# Test directories
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Coverage exclusions (not counted toward coverage metrics): the process entry
# point, Prometheus metric definitions, OTel tracing wiring, the OCI client
# which wraps the SDK and requires a live tenancy, and the agent's Consul/OCI
# client adapters (thin SDK wrappers with no isolatable logic). The logic that
# uses these is covered via fakes against the consumer interfaces.
sonar.coverage.exclusions=cmd/**,internal/metrics/**,internal/tracing/**,internal/oci/**,internal/agent/clients.go,internal/monitor/clients.go

sonar.sourceEncoding=UTF-8
