# -------------------------------------------------------------------------------
# Oracle Watchdog - Example Configuration
#
# Project: Munchbox / Author: Alex Freidah
#
# Copy to /etc/oracle-watchdog/config.yaml and fill in OCI instance details.
# -------------------------------------------------------------------------------

# How long a node must be unresponsive before triggering restart
timeout: 5m

# How often to check for missing node heartbeats
check_interval: 30s

# Max consecutive restart attempts per node before the agent stops trying.
# Zero means unlimited. The per-node counter resets when the node recovers.
max_restart_attempts: 0

# Consul connection
consul_address: consul.service.consul:8500

# OCI authentication
oci:
  config_path: /etc/oracle-watchdog/oci-config
  profile: DEFAULT

# Oracle nodes to monitor
nodes:
  - name: oraclenode1
    instance_id: ocid1.instance.oc1.iad.xxx
    compartment_id: ocid1.compartment.oc1..xxx

  - name: oracle-arm-1
    instance_id: ocid1.instance.oc1.iad.xxx
    compartment_id: ocid1.compartment.oc1..xxx

  - name: oracle-arm-2
    instance_id: ocid1.instance.oc1.iad.xxx
    compartment_id: ocid1.compartment.oc1..xxx

# -------------------------------------------------------------------------
# Optional: Monitor-mode WireGuard endpoint resolver
#
# Re-resolves a configured WireGuard peer hostname on an interval and
# updates the kernel peer endpoint via netlink when the resolved IPv4
# changes. Forces an immediate update when the most recent peer handshake
# exceeds stale_handshake_threshold even if the IP did not change.
#
# Default-disabled and independent of the core OCI-restart flow. Omit the
# block entirely to keep monitor mode running only the Consul heartbeat.
#
# Validation minimums: resolve_interval >= 10s,
# stale_handshake_threshold >= 30s, endpoint_port in 1-65535.
# -------------------------------------------------------------------------
wireguard:
  enabled: false
  interface: wg0
  peer_pubkey: ""
  endpoint_hostname: wg.example.com
  endpoint_port: 51820
  resolve_interval: 60s
  stale_handshake_threshold: 180s

# -------------------------------------------------------------------------
# Optional: Agent-mode WAN-IP DDNS updater
#
# Detects the host's public IPv4 via the configured detection providers
# (tried in order, first parseable response wins) and keeps a Cloudflare
# A record in sync. IPv4 only. The Cloudflare API token must live in the
# env var named below; it is read once at startup and never embedded in
# this file.
#
# Default-disabled and independent of the core OCI-restart flow. Omit the
# block entirely to keep agent mode running only the missing-heartbeat
# detector.
#
# Validation minimums: poll_interval >= 30s, cooldown >= 1m.
# -------------------------------------------------------------------------
wan_dns:
  enabled: false
  hostname: ddns.example.com
  cloudflare:
    api_token_env: CLOUDFLARE_API_TOKEN
    zone_id: ""
  detection_providers:
    - https://api.ipify.org
    - https://1.1.1.1/cdn-cgi/trace
  poll_interval: 5m
  cooldown: 15m

# -------------------------------------------------------------------------
# Optional: OpenTelemetry tracing (both modes)
#
# Default-disabled. When enabled, spans export to Tempo over OTLP/HTTP. The
# endpoint is a bare host:port with no scheme; leave it empty to fall back
# to OTEL_EXPORTER_OTLP_ENDPOINT and then the built-in default
# (tempo.service.consul:4318). The -tracing CLI flag force-enables tracing
# regardless of the enabled value here.
# -------------------------------------------------------------------------
tracing:
  enabled: false
  endpoint: "tempo.service.consul:4318"
