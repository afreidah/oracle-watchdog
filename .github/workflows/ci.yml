# -------------------------------------------------------------------------------
# CI Workflow - GitHub Actions
#
# Author: Alex Freidah
#
# Runs on push to main and pull requests. A path-detection job determines which
# file categories changed and downstream jobs use those outputs to skip
# irrelevant work. On push to main, Docker image builds run for the categories
# that changed.
# -------------------------------------------------------------------------------

name: CI

on:
  push:
    branches: [main]
  pull_request:

# Permissions are declared per job (least privilege, githubactions:S8264)
# rather than workflow-wide.
jobs:
  # ---------------------------------------------------------------------------
  # PATH DETECTION
  # ---------------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      go: ${{ steps.filter.outputs.go }}
      sonar: ${{ steps.filter.outputs.sonar }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - '.golangci.yml'
            # SonarCloud analyses more than Go: workflows, Dockerfiles, the Hugo
            # site, and the analysis config are all in scope, so the scan must
            # run when any of these change, not just on Go changes.
            sonar:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - '.golangci.yml'
              - '.github/workflows/**'
              - '**/Dockerfile'
              - 'web/**'
              - 'sonar-project.properties'

  # ---------------------------------------------------------------------------
  # GO CHECKS
  # ---------------------------------------------------------------------------
  version-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for Go changes
        id: changes
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qE '\.go$'; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify version bump
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          BASE_VERSION=$(git show origin/${{ github.base_ref }}:.version)
          PR_VERSION=$(cat .version)
          if [ "$BASE_VERSION" = "$PR_VERSION" ]; then
            echo "::error::.version must be incremented when Go files change (current: $PR_VERSION)"
            exit 1
          fi
          echo "Version bumped: $BASE_VERSION → $PR_VERSION"

  lint:
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true

      - name: Lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: v2.10.1

  test:
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true

      - name: Unit tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

  govulncheck:
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Official action does checkout + setup-go + install + run, so the workflow
      # carries no `go install ...@version` of its own (not lock-file
      # deterministic, githubactions:S8545).
      # TEMP: force the 1.26.4 toolchain (stdlib CVE fix) via GOTOOLCHAIN until
      # go.mod's go directive moves past it. The action's go commands inherit it.
      - name: Run govulncheck
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          go-version-file: go.mod
        env:
          GOTOOLCHAIN: go1.26.4

  # ---------------------------------------------------------------------------
  # SONARQUBE ANALYSIS (coverage + quality gate -> SonarCloud)
  # ---------------------------------------------------------------------------
  sonarqube:
    needs: [changes]
    if: needs.changes.outputs.sonar == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so SonarCloud can attribute new code

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true

      - name: Generate coverage
        run: go test -coverprofile=coverage.out -covermode=atomic ./...

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ---------------------------------------------------------------------------
  # DOCKER IMAGES (push to main only)
  # ---------------------------------------------------------------------------
  docker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    needs: [changes, lint, test]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Log in to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Read version
        id: version
        run: echo "version=$(cat .version)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          pull: true
          push: true
          build-args: VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/afreidah/oracle-watchdog:${{ steps.version.outputs.version }}
            ghcr.io/afreidah/oracle-watchdog:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Official action avoids piping a downloaded installer into a shell
      # (githubactions:S8482 / S6506).
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/afreidah/oracle-watchdog:${{ steps.version.outputs.version }}
          exit-code: 1
          severity: CRITICAL,HIGH
